# --- 基础配置 ---
ipv6: false
http_port: 3080
socks_port: 3090
allow_external_connections: true
vif_only: true
hide_vpn_icon: true
public_ip_lookup_url: https://ifconfig.me/ip

# --- DNS 劫持 ---
hijack_dns:
  - '*:53'

# --- 延迟测试 ---
proxy_latency_test_url: http://www.gstatic.com/generate_204
direct_latency_test_url: http://www.apple.com/library/test/success.html

# --- 路由选项 ---
compat_route: false
include_all_networks: false
include_apns: false
include_cellular_services: false
include_local_networks: false

# --- DNS 配置 ---
dns:
  bootstrap:
    - system
    - 223.5.5.5
    - 119.29.29.29
  
policy_groups:
- external:
    name: 所有订阅
    type: select
    urls:
    - https://xxx.com
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png
- select:
    name: PROXY
    policies:
    - 所有订阅
    - 🇭🇰 香港节点
    - 🇯🇵 日本节点
    - 🇨🇳 台湾节点
    - 🇸🇬 新加坡节点
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
- select:
    name: 苹果服务
    policies:
    - DIRECT
    - PROXY
    - 🇭🇰 香港节点
    - 🇸🇬 新加坡节点
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png
- select:
    name: Telegram
    policies:
    - PROXY
    - 🇭🇰 香港节点
    - 🇯🇵 日本节点
    - 🇨🇳 台湾节点
    - 🇸🇬 新加坡节点
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
- select:
    name: 🇭🇰 香港节点
    policies:
    - 所有订阅
    flatten: true
    filter: (?i)港|HK|hk|Hong Kong|HongKong|hongkong
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
- select:
    name: 🇨🇳 台湾节点
    policies:
    - 所有订阅
    flatten: true
    filter: (?i)台|新北|彰化|TW|Taiwan
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
- select:
    name: 🇯🇵 日本节点
    policies:
    - 所有订阅
    flatten: true
    filter: (?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
- select:
    name: 🇸🇬 新加坡节点
    policies:
    - 所有订阅
    flatten: true
    filter: (?i)新加坡|坡|狮城|SG|Singapore
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png

rules:
- domain_regex:
    match: ^ad\..*|^ads\..*
    policy: REJECT
- rule_set:
    match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/telegramcidr.txt
    policy: Telegram
- rule_set:
    match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/apple.txt
    policy: 苹果服务
- rule_set:
    match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/icloud.txt
    policy: 苹果服务
- rule_set:
    match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/private.txt
    policy: DIRECT
- rule_set:
    match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/direct.txt
    policy: DIRECT
- rule_set:
    match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/cncidr.txt
    policy: DIRECT
- rule_set:
    match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/proxy.txt
    policy: PROXY
- default:
    policy: PROXY

mitm:
  enabled: true
  ca_p12: egern.p12
  ca_passphrase: egern

modules:
- name: 'Sub-Store订阅'
  url: https://raw.githubusercontent.com/sub-store-org/Sub-Store/master/config/Surge.sgmodule
  enabled: true
- name: YouTube Enhance
  url: https://raw.githubusercontent.com/Maasea/sgmodule/master/YouTube.Enhance.sgmodule
  enabled: true
